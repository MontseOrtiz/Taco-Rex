<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Taco Rex</title>
</head>
<body>
    <main class="app-shell">
        <header id="logo">
            <img src="./Imagenes/LOGO1.png" alt="Taco Rex" width="400" height="150">
            <p class="subtitle">Arcade runner hecho con JavaScript + Canvas</p>
        </header>

        <section id="canvasC" aria-label="Juego Taco Rex">
            <canvas id="canvas" width="900" height="400"></canvas>
            <button id="jugar">Jugar</button>
            <p class="hint">Controles: Enter para iniciar, flechas para mover, P para pausar</p>
        </section>

        <section id="instru" aria-label="Instrucciones">
            <img class="inst" src="./Imagenes/instrucciones.png" alt="Instrucciones del juego" width="950" height="400">
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
